name: check-latest-migration
on:
  pull_request:

jobs:
  check-latest-migration:
    name: Check latest migration
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: aws-actions/configure-aws-credentials@99214aa6889fcddfa57764031d71add364327e59 # v6.1.3
        with:
          aws-region: eu-west-1
          role-to-assume: ${{ secrets.SSM_AUTH }}

      - name: Check the latest migration version
        run: ./scripts/check-latest-migration.sh
